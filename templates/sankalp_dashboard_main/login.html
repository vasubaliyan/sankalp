{% load static %}  <!-- must be at the top -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Security & Cache Control -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer-when-downgrade">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Sankalp Login</title>

  <!-- CSS -->
{% load static %}

<link rel="stylesheet" href="{% static 'css/variables.css' %}">
<link rel="stylesheet" href="{% static 'css/global.css' %}">
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">
<link rel="stylesheet" href="{% static 'css/login.css' %}">

  <!-- Favicon -->
  <link rel="shortcut icon" href="{% static 'img/favicon.png' %}" type="image/x-icon">

  <!-- JS -->
  <script type="module" src="{% static 'js/login.js' %}"></script>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">Sankalp</div>
    <ul>
      <li><a href="">Home</a></li>
      <li><a href="">About</a></li>
    </ul>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required autocomplete="off" autocapitalize="none" spellcheck="false">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary">Login</button>
      </form>
    </div>
  </div>

  <!-- Navbar JS -->
  <script src="{%static 'js/navbar.js' %}"></script>
</body>
</html>
